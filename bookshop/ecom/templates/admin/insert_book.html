<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Book - Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f9fafb; }
        .admin-input { width: 100%; padding: 0.5rem 0.75rem; font-size: 0.875rem; line-height: 1.25rem; color: #111827; background-color: #ffffff; border: 1px solid #d1d5db; border-radius: 0.375rem; box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05); transition: all 0.2s; }
        .admin-input:focus { outline: none; border-color: #6366f1; box-shadow: 0 0 0 1px #6366f1; }
        .admin-label { display: block; font-size: 0.875rem; font-weight: 500; color: #374151; margin-bottom: 0.25rem; }
    </style>
</head>
<body class="min-h-screen flex flex-col selection:bg-rose-100 selection:text-rose-900">
    {% include "admin/admin_header.html" %}

    <main class="flex-1 w-full max-w-[1400px] mx-auto px-6 lg:px-12 py-8">
        <div class="mb-6">
            <h1 class="text-2xl font-bold text-gray-900">Add New Book</h1>
            <p class="text-gray-500 text-sm">Fill in the details to add a new book to the catalog.</p>
        </div>

        <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 lg:p-8 max-w-3xl">
            <form action="" method="post" enctype="multipart/form-data" class="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-5">
                {% csrf_token %}

                <div class="md:col-span-2">
                    <label class="admin-label">Book Title</label>
                    <input type="text" name="title" class="admin-input" placeholder="Enter book title">
                </div>
                
                <div>
                    <label class="admin-label">Author</label>
                    <input type="text" name="author" class="admin-input" placeholder="Author name">
                </div>
                
                <div>
                    <label class="admin-label">Genre</label>
                    <select name="genre" class="admin-input">
                        <option value="">Select genre</option>
                        {% for g in genre %}
                            <option value="{{g.id}}">{{g.title}}</option>
                        {% endfor %}
                    </select>
                </div>

                <div>
                    <label class="admin-label">ISBN</label>
                    <input type="text" name="isbn" class="admin-input" placeholder="ISBN number">
                </div>
                
                <div>
                    <label class="admin-label">Number of Pages</label>
                    <input type="number" name="nop" class="admin-input" placeholder="e.g. 350">
                </div>
                
                <div>
                    <label class="admin-label">Price (₹)</label>
                    <input type="number" step="0.01" name="price" class="admin-input" placeholder="e.g. 499.00">
                </div>
                
                <div>
                    <label class="admin-label">Year of Publication</label>
                    <input type="number" name="publish_year" class="admin-input" placeholder="e.g. 2023">
                </div>
                
                <div class="md:col-span-2">
                    <label class="admin-label">Cover Image</label>
                    <input type="file" name="cover_image" class="admin-input bg-gray-50 file:mr-4 file:py-1 file:px-3 file:rounded file:border-0 file:text-sm file:font-semibold file:bg-gray-200 file:text-gray-700 hover:file:bg-gray-300">
                </div>

                <div class="md:col-span-2">
                    <label class="admin-label">Description</label>
                    <textarea name="description" rows="5" class="admin-input" placeholder="Write book synopsis..."></textarea>
                </div>
                
                <div class="md:col-span-2 mt-2">
                    <button type="submit" class="px-5 py-2.5 bg-gray-900 text-white font-medium rounded-md hover:bg-gray-800 focus:outline-none focus:ring-2 focus:ring-gray-900 focus:ring-offset-2 transition-colors">
                        Create Book
                    </button>
                </div>
            </form>
        </div>
    </main>
    
    {% include "admin/admin_footer.html" %}
</body>
</html>
