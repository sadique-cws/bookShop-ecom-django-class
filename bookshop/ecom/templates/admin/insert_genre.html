<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Genre - Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f9fafb; }
        .admin-input { width: 100%; padding: 0.5rem 0.75rem; font-size: 0.875rem; line-height: 1.25rem; color: #111827; background-color: #ffffff; border: 1px solid #d1d5db; border-radius: 0.375rem; box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05); transition: all 0.2s; }
        .admin-input:focus { outline: none; border-color: #6366f1; box-shadow: 0 0 0 1px #6366f1; }
        .admin-label { display: block; font-size: 0.875rem; font-weight: 500; color: #374151; margin-bottom: 0.25rem; }
    </style>
</head>
<body class="min-h-screen flex flex-col selection:bg-rose-100 selection:text-rose-900">
    {% include "admin/admin_header.html" %}

    <main class="flex-1 w-full max-w-[1400px] mx-auto px-6 lg:px-12 py-8">
        <div class="mb-6">
            <h1 class="text-2xl font-bold text-gray-900">Add New Genre</h1>
            <p class="text-gray-500 text-sm">Create a new category for your books.</p>
        </div>

        <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 lg:p-8 max-w-2xl">
            <form action="" method="post">
                {% csrf_token %}

                <div class="mb-5">
                    <label class="admin-label">Genre Title</label>
                    <input type="text" name="title" class="admin-input" placeholder="e.g. Science Fiction">
                </div>
                
                <div class="mb-6">
                    <label class="admin-label">Genre Description</label>
                    <textarea name="description" class="admin-input" rows="4" placeholder="Describe the genre..."></textarea>
                </div>
                
                <div>
                    <button type="submit" class="px-5 py-2.5 bg-gray-900 text-white font-medium rounded-md hover:bg-gray-800 focus:outline-none focus:ring-2 focus:ring-gray-900 focus:ring-offset-2 transition-colors">
                        Create Genre
                    </button>
                </div>
            </form>
        </div>
    </main>
    
    {% include "admin/admin_footer.html" %}
</body>
</html>
