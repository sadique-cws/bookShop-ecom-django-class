<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - BookShop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    {% load static %}
    <link rel="stylesheet" href="{% static 'style.css' %}">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f9fafb; }
    </style>
</head>
<body class="min-h-screen flex flex-col selection:bg-rose-100 selection:text-rose-900">
    {% include "admin/admin_header.html" %}

    <main class="flex-1 w-full max-w-[1400px] mx-auto px-6 lg:px-12 py-8">
        <div class="mb-8">
            <h1 class="text-2xl font-bold text-gray-900">Dashboard</h1>
            <p class="text-gray-500 text-sm">Overview of your bookstore.</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200 flex flex-col">
                <div class="text-gray-500 text-sm font-medium mb-1">Total Genres</div>
                <div class="text-3xl font-bold text-gray-900">{{genre}}</div>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200 flex flex-col">
                <div class="text-gray-500 text-sm font-medium mb-1">Total Books</div>
                <div class="text-3xl font-bold text-gray-900">{{books}}</div>
            </div>
        </div>
    </main>

    {% include "admin/admin_footer.html" %}
</body>
</html>
