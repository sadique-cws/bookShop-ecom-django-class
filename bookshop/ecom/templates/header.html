<header class="sticky top-0 z-50 bg-rose-600 shadow border-b border-rose-700">
    <div class="flex items-center justify-between px-4 lg:px-8 py-3 max-w-[1400px] mx-auto">
        <a href="{% url 'homepage' %}" class="flex items-center gap-2 text-xl text-white font-semibold tracking-tight hover:opacity-90 transition-opacity">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
            </svg>
            BookShop
        </a>

        <form action="{% url 'search' %}" method="get" class="flex flex-1 max-w-lg mx-8 relative">
            <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
                <svg class="w-4 h-4 text-rose-200" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            </div>
            <input type="search" value="{% if search %} {{search}} {% endif %}" name="search" class="w-full pl-9 pr-3 py-2 bg-rose-700/60 border border-transparent text-white text-sm placeholder-rose-200 rounded-l focus:outline-none focus:bg-white focus:text-gray-900 focus:placeholder-gray-500 focus:border-white transition-colors" placeholder="Search by title, author or ISBN...">
            <button type="submit" class="px-5 py-2 bg-gray-900 text-white rounded-r text-sm font-medium hover:bg-gray-800 focus:outline-none focus:ring-2 focus:ring-gray-900 focus:ring-offset-2 focus:ring-offset-rose-600 transition-colors">Search</button>
        </form>

        <nav class="flex items-center gap-1">
            <a href="{% url 'homepage' %}" class="text-white hover:bg-rose-700 px-3 py-1.5 rounded text-sm font-medium transition-colors">Home</a>
            <a href="{% url 'cart' %}" class="text-white hover:bg-rose-700 px-3 py-1.5 rounded text-sm font-medium transition-colors relative">
                Cart
                <span class="absolute top-1.5 right-1 flex h-2 w-2">
                  <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-white opacity-75"></span>
                  <span class="relative inline-flex rounded-full h-2 w-2 bg-rose-200"></span>
                </span>
            </a>

            {% if request.user.is_authenticated %}

                <span class="text-white px-3 py-1.5 rounded text-sm font-medium transition-colors">
                    {% if request.user.first_name %}
                            {{request.user.first_name}}
                    {% else %}
                            {{request.user.username}}
                    {% endif %}
                </span>
                <a href="{% url 'logout' %}" class="text-white hover:bg-rose-700 px-3 py-1.5 rounded text-sm font-medium transition-colors">Logout</a>
            
            {% else %}

                <a href="{% url 'login' %}" class="text-white hover:bg-rose-700 px-3 py-1.5 rounded text-sm font-medium transition-colors">Login</a>
                <a href="{% url 'register' %}" class="bg-white text-rose-700 hover:bg-gray-50 px-4 py-1.5 rounded text-sm font-semibold transition-colors ml-2 shadow-sm">Register</a>


            {% endif %}
        </nav>    
    </div>
</header>
