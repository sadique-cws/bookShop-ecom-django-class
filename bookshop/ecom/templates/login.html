<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - BookShop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f9fafb; }
        /* Style Django forms */
        .django-form p { margin-bottom: 1rem; }
        .django-form label { display: block; font-size: 0.875rem; font-weight: 500; color: #374151; margin-bottom: 0.25rem; }
        .django-form input, .django-form select, .django-form textarea { width: 100%; padding: 0.5rem 0.75rem; font-size: 0.875rem; line-height: 1.25rem; color: #111827; background-color: #ffffff; border: 1px solid #d1d5db; border-radius: 0.375rem; box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05); }
        .django-form input:focus, .django-form select:focus, .django-form textarea:focus { outline: none; border-color: #e11d48; box-shadow: 0 0 0 1px #e11d48; }
        .django-form .helptext { font-size: 0.75rem; color: #6b7280; margin-top: 0.25rem; display: block; }
        .django-form ul.errorlist { color: #dc2626; font-size: 0.875rem; margin-bottom: 0.5rem; }
    </style>
</head>
<body class="min-h-screen flex flex-col selection:bg-rose-100 selection:text-rose-900">

    {% include "header.html" %}

    <div class="flex-1 flex justify-center items-center p-4">
        <div class="w-full max-w-md bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
            <div class="p-6 sm:p-8">
                <div class="text-center mb-8">
                    <h1 class="text-2xl font-bold text-gray-900 mb-2">Welcome back</h1>
                    <p class="text-gray-500 text-sm">Please enter your details to sign in.</p>
                </div>

                <form action="" method="post" class="django-form">
                    {% csrf_token %}
                    
                    {{loginForm.as_p}}
                    
                    <div class="mt-6">
                        <button type="submit" class="w-full px-4 py-2 bg-rose-600 text-white font-semibold rounded-md hover:bg-rose-700 focus:outline-none focus:ring-2 focus:ring-rose-500 focus:ring-offset-2 transition-colors">
                            Sign In
                        </button>
                    </div>
                </form>

                <div class="mt-6 text-center text-sm text-gray-500">
                    Don't have an account? <a href="{% url 'register' %}" class="font-medium text-rose-600 hover:text-rose-500">Sign up</a>
                </div>
            </div>
        </div>
    </div>
    
</body>
</html>
